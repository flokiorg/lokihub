name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    name: Build frontend (dist)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Go code embeds frontend/dist (see frontend/frontend.go, main_wails.go),
    # so any job that builds/vets/lints/tests Go packages needs it to exist
    # first. Built once here and shared, instead of re-running yarn in every
    # Go job.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: yarn build:http

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  test-go:
    name: Go build, vet, test
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race -count=1 ./...

  lint-go:
    name: golangci-lint
    needs: build-frontend
    runs-on: ubuntu-latest
    # Blocking: the pre-existing findings backlog (errcheck, gosec G304/G301/
    # G115/G118, noctx, ineffassign, staticcheck) was fully triaged and fixed
    # across PRs #55-#59. golangci-lint run is 0 issues as of that point -
    # flip back to continue-on-error: true only if a future finding needs
    # more than a quick fix and shouldn't block merges in the meantime.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  security-go:
    name: govulncheck + gosec
    needs: build-frontend
    runs-on: ubuntu-latest
    # Non-blocking initially: the first run surfaced a real, pre-existing
    # baseline (see docs/audits/security-self-review-2026-07.md / docs/audits/security-audit-scope.md)
    # that hasn't been triaged yet. Flip continue-on-error to false once that
    # baseline is either fixed or explicitly accepted.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest ./...

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    # Blocking, via a ratchet rather than a one-time cleanup: the pre-existing
    # backlog (123 errors across 31 files, mostly `curly`/`no-explicit-any`)
    # is captured in frontend/eslint-suppressions.json (ESLint's native bulk-
    # suppressions feature - see `eslint --help` under "Suppressing
    # Violations"), so those specific, already-known violations don't fail
    # the build, but any NEW error anywhere does. The remaining 17
    # react-hooks/exhaustive-deps warnings aren't suppressible the same way
    # (suppressions only cover error-severity rules) - `--max-warnings 17` in
    # package.json's lint:js script pins that count as a ceiling instead, so
    # a new warning also fails the build. Whenever an existing suppressed
    # error or baseline warning actually gets fixed, re-run
    # `eslint src --suppress-all --prune-suppressions` and lower
    # --max-warnings to ratchet the ceiling down.
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint
        run: yarn lint:js

  frontend:
    name: Frontend build, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Set up Go
        # Only needed for the osv-scanner dependency audit below - yarn
        # classic's own `yarn audit` backend is permanently down (registry
        # returns 410, a known yarn-v1 EOL issue), so this uses osv-scanner
        # against yarn.lock directly instead. See docs/audits/security-audit-scope.md.
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build:http

      - name: Dependency audit
        # Non-blocking initially: first run surfaced a real, untriaged
        # baseline (see docs/audits/security-audit-scope.md) - mostly build-tooling
        # transitive deps (vite/rollup/esbuild/babel), not runtime code.
        continue-on-error: true
        run: yarn run audit:deps
