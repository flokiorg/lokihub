version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: org.flokiorg.lokihub
    name: Lokihub
    icon: lokihub
    version: '{{TAG}}'
    exec: usr/bin/lokihub
    exec_args: $@

  apt:
    arch: '{{APPIMAGE_APT_ARCH}}'
    sources:
      - sourceline: '{{APPIMAGE_APT_SOURCE}}'
        key_url: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C'

    include:
      - libgtk-3-0
      - '{{LIBWEBKIT}}'
      - libappindicator3-1

  files:
    exclude:
      - usr/share/man
      - usr/share/doc
      - usr/share/lintian

  runtime:
    env:
      APPDIR_LIBRARY_PATH: '$APPDIR/usr/lib/{{APPIMAGE_TRIPLET}}:$APPDIR/usr/lib'

AppImage:
  arch: '{{APPIMAGE_ARCH}}'
  file_name: '{{APPIMAGE_FILE_NAME}}'
